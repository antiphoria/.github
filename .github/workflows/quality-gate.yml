name: Global Quality Gate

on:
  workflow_call:
    inputs:
      policy-ref:
        description: Ref or tag to use for shared antiphoria policy files.
        required: false
        type: string
        default: main
      python-version:
        description: Python version for Python-specific checks.
        required: false
        type: string
        default: "3.11"
      node-version:
        description: Node.js version for Node and Astro checks.
        required: false
        type: string
        default: "20"
      upload-trivy-sarif:
        description: Upload Trivy results to GitHub code scanning (requires security-events write and GHAS or a public repo).
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.detect.outputs.has_python }}
      has_node: ${{ steps.detect.outputs.has_node }}
      package_manager: ${{ steps.detect.outputs.package_manager }}
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Detect repository profile
        id: detect
        shell: bash
        run: |
          has_python=false
          has_node=false
          package_manager=npm

          if git ls-files '*.py' | grep -q .; then
            has_python=true
          fi

          if [ -f package.json ]; then
            has_node=true
          fi

          if [ -f pnpm-lock.yaml ]; then
            package_manager=pnpm
          elif [ -f yarn.lock ]; then
            package_manager=yarn
          fi

          echo "has_python=$has_python" >> "$GITHUB_OUTPUT"
          echo "has_node=$has_node" >> "$GITHUB_OUTPUT"
          echo "package_manager=$package_manager" >> "$GITHUB_OUTPUT"

  trivy:
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Checkout shared policy repository
        uses: actions/checkout@v4
        with:
          repository: antiphoria/.github
          ref: ${{ inputs.policy-ref }}
          path: .org-policy

      - name: Run Trivy JSON scan
        id: trivy_json
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: .org-policy/trivy.yaml
          cache: "true"

      - name: Generate Trivy HTML report
        if: always()
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: .org-policy/trivy.yaml
          format: template
          template: "@html"
          output: trivy-report.html
          exit-code: "0"
          skip-setup-trivy: true

      - name: Trivy summary for GitHub Step Summary
        if: always()
        shell: bash
        run: |
          echo "## Trivy" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [[ -f trivy-results.json ]]; then
            vuln="$(jq '[.Results[]? | (.Vulnerabilities // []) | length] | add // 0' trivy-results.json 2>/dev/null || echo "?")"
            secret="$(jq '[.Results[]? | (.Secrets // []) | length] | add // 0' trivy-results.json 2>/dev/null || echo "?")"
            misconf="$(jq '[.Results[]? | (.Misconfigurations // []) | length] | add // 0' trivy-results.json 2>/dev/null || echo "?")"
            lic="$(jq '[.Results[]? | (.Licenses // []) | length] | add // 0' trivy-results.json 2>/dev/null || echo "?")"
            echo "| Category | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Vulnerabilities | ${vuln} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Secrets | ${secret} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Misconfigurations | ${misconf} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Licenses | ${lic} |" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Sample findings (first 10 lines)</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            jq -r '
              [.Results[]? | . as $r |
                ($r.Vulnerabilities // [])[] | "[vuln] \($r.Target // "?"): \(.VulnerabilityID // .PkgName // "?")"
              ] + [.Results[]? | . as $r |
                ($r.Secrets // [])[] | "[secret] \($r.Target // "?"): \(.Title // .RuleID // "?")"
              ] + [.Results[]? | . as $r |
                ($r.Misconfigurations // [])[] | "[misconfig] \($r.Target // "?"): \(.AVDID // .ID // .Title // "?")"
              ]
              | .[0:10][]' trivy-results.json 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "(parse error)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No \`trivy-results.json\` produced (see Trivy job log)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-${{ github.run_id }}
          path: |
            trivy-results.json
            trivy-report.html
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce Trivy result
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.trivy_json.outcome }}" != "success" ]; then
            echo "Trivy reported blocking findings or encountered a blocking error."
            exit 1
          fi

  trivy-sarif:
    needs: trivy
    if: ${{ inputs.upload-trivy-sarif }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Checkout shared policy repository
        uses: actions/checkout@v4
        with:
          repository: antiphoria/.github
          ref: ${{ inputs.policy-ref }}
          path: .org-policy

      - name: Run Trivy SARIF (for GitHub code scanning)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: .org-policy/trivy-sarif.yaml
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  python-ruff:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Checkout shared policy repository
        uses: actions/checkout@v4
        with:
          repository: antiphoria/.github
          ref: ${{ inputs.policy-ref }}
          path: .org-policy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint (JSON report)
        id: ruff_lint
        continue-on-error: true
        run: ruff check . --config .org-policy/ruff.toml --output-format json -o ruff-results.json

      - name: Ruff summary for GitHub Step Summary
        if: always()
        shell: bash
        run: |
          echo "## Ruff" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [[ -f ruff-results.json ]]; then
            total="$(jq 'length' ruff-results.json 2>/dev/null || echo "?")"
            echo "Diagnostics: **${total}**" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Top rules by count</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            jq -r 'group_by(.code) | map({code: .[0].code, n: length}) | sort_by(-.n) | .[:15] | .[] | "\(.n)\t\(.code)"' ruff-results.json 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>First 15 issues</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            jq -r '.[:15][] | "\(.filename // "?"):\(.location.row // "?")\t\(.code // "?")\t\(.message // "")"' ruff-results.json 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No \`ruff-results.json\` (see Ruff job log)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Ruff JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-scan-${{ github.run_id }}
          path: ruff-results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Ruff format check
        run: ruff format . --config .org-policy/ruff.toml --check

      - name: Enforce Ruff lint outcome
        if: steps.ruff_lint.outcome != 'success'
        run: |
          echo "Ruff lint failed; see summary and ruff-scan artifact."
          exit 1

  python-test:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      
      - name: Install system dependencies for OQS
        run: |
          sudo apt-get update
          sudo apt-get install -y libgit2-dev pkg-config cmake ninja-build libssl-dev

      - name: Install project and dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f setup.py ] || [ -f pyproject.toml ]; then
            pip install -e .
          fi

      - name: Run unit tests (if tests directory exists)
        id: unit_tests
        shell: bash
        run: |
          if [ -d tests ]; then
            echo "ran=true" >> "$GITHUB_OUTPUT"
            python -m unittest discover -s tests
          else
            echo "ran=false" >> "$GITHUB_OUTPUT"
            echo "No tests/ directory found. Skipping."
          fi

      - name: Python tests summary
        if: always()
        shell: bash
        run: |
          echo "## Python tests" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.unit_tests.outputs.ran }}" = "true" ]; then
            echo "Ran \`unittest\` discovery under \`tests/\` (see this job log for tracebacks)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Skipped: no \`tests/\` directory." >> "$GITHUB_STEP_SUMMARY"
          fi

  python-codeaudit:
    needs: detect
    if: needs.detect.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install CodeAudit
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install codeaudit

      - name: Create report directory
        run: mkdir -p codeaudit-reports

      - name: Run CodeAudit overview
        continue-on-error: true
        run: codeaudit overview . codeaudit-reports/overview.html

      - name: Run CodeAudit filescan
        continue-on-error: true
        run: codeaudit filescan . codeaudit-reports/filescan.html

      - name: Run CodeAudit modulescan
        continue-on-error: true
        run: codeaudit modulescan . codeaudit-reports/modulescan.html

      - name: Upload CodeAudit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeaudit-reports-${{ github.run_id }}
          path: codeaudit-reports
          if-no-files-found: warn
          retention-days: 30

  node-quality:
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ needs.detect.outputs.package_manager }}
        run: |
          case "$PACKAGE_MANAGER" in
            pnpm)
              if [ -f pnpm-lock.yaml ]; then
                pnpm install --frozen-lockfile
              else
                pnpm install
              fi
              ;;
            yarn)
              yarn install --immutable || yarn install --frozen-lockfile || yarn install
              ;;
            *)
              if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
                npm ci
              else
                npm install
              fi
              ;;
          esac

      - name: Run lint script when present
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ needs.detect.outputs.package_manager }}
        run: |
          set -euo pipefail
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.lint ? 0 : 1)"; then
            case "$PACKAGE_MANAGER" in
              pnpm) pnpm run lint 2>&1 | tee node-lint.log ;;
              yarn) yarn run lint 2>&1 | tee node-lint.log ;;
              *) npm run lint --if-present 2>&1 | tee node-lint.log ;;
            esac
          else
            echo "No lint script defined." | tee node-lint.log
          fi

      - name: Run check script when present
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ needs.detect.outputs.package_manager }}
        run: |
          set -euo pipefail
          : > node-scripts.log
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.check ? 0 : 1)"; then
            case "$PACKAGE_MANAGER" in
              pnpm) pnpm run check 2>&1 | tee -a node-scripts.log ;;
              yarn) yarn run check 2>&1 | tee -a node-scripts.log ;;
              *) npm run check --if-present 2>&1 | tee -a node-scripts.log ;;
            esac
          else
            echo "No check script defined." | tee -a node-scripts.log
          fi

      - name: Run build script when present
        shell: bash
        env:
          PACKAGE_MANAGER: ${{ needs.detect.outputs.package_manager }}
        run: |
          set -euo pipefail
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1)"; then
            case "$PACKAGE_MANAGER" in
              pnpm) pnpm run build 2>&1 | tee -a node-scripts.log ;;
              yarn) yarn run build 2>&1 | tee -a node-scripts.log ;;
              *) npm run build --if-present 2>&1 | tee -a node-scripts.log ;;
            esac
          else
            echo "No build script defined." | tee -a node-scripts.log
          fi

      - name: Upload Node script logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-quality-logs-${{ github.run_id }}
          path: |
            node-lint.log
            node-scripts.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Node quality summary
        if: always()
        shell: bash
        run: |
          echo "## Node (lint / check / build)" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "See this job log. On failure, \`node-quality-logs-*\` artifact may include captured output." >> "$GITHUB_STEP_SUMMARY"

  quality-gate:
    if: always()
    needs:
      - detect
      - trivy
      - python-ruff
      - python-test
      - node-quality
    runs-on: ubuntu-latest
    steps:
      - name: Verify blocking jobs
        shell: bash
        env:
          DETECT_RESULT: ${{ needs.detect.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
          PYTHON_RUFF_RESULT: ${{ needs.python-ruff.result }}
          PYTHON_TEST_RESULT: ${{ needs.python-test.result }}
          NODE_QUALITY_RESULT: ${{ needs.node-quality.result }}
        run: |
          failures=0

          check_blocker() {
            local job_name="$1"
            local job_result="$2"

            case "$job_result" in
              success|skipped)
                echo "$job_name: $job_result"
                ;;
              *)
                echo "$job_name: $job_result"
                failures=1
                ;;
            esac
          }

          check_blocker detect "$DETECT_RESULT"
          check_blocker trivy "$TRIVY_RESULT"
          check_blocker python-ruff "$PYTHON_RUFF_RESULT"
          check_blocker python-test "$PYTHON_TEST_RESULT"
          check_blocker node-quality "$NODE_QUALITY_RESULT"

          if [ "$failures" -ne 0 ]; then
            echo "The quality gate failed."
            exit 1
          fi

  ci-handoff:
    if: always()
    needs:
      - detect
      - trivy
      - python-ruff
      - python-test
      - node-quality
      - python-codeaudit
      - quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Prepare handoff directory
        run: mkdir -p handoff-raw

      - name: Download workflow artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: handoff-raw

      - name: Record job results for handoff
        shell: bash
        env:
          JR_DETECT: ${{ needs.detect.result }}
          JR_TRIVY: ${{ needs.trivy.result }}
          JR_RUFF: ${{ needs.python-ruff.result }}
          JR_PYTEST: ${{ needs.python-test.result }}
          JR_CODEAUDIT: ${{ needs.python-codeaudit.result }}
          JR_NODE: ${{ needs.node-quality.result }}
          JR_GATE: ${{ needs.quality-gate.result }}
        run: |
          jq -n \
            --arg detect "$JR_DETECT" \
            --arg trivy "$JR_TRIVY" \
            --arg ruff "$JR_RUFF" \
            --arg pytest "$JR_PYTEST" \
            --arg codeaudit "$JR_CODEAUDIT" \
            --arg node "$JR_NODE" \
            --arg gate "$JR_GATE" \
            '{
              detect: $detect,
              trivy: $trivy,
              "python-ruff": $ruff,
              "python-test": $pytest,
              "python-codeaudit": $codeaudit,
              "node-quality": $node,
              "quality-gate": $gate
            }' > handoff-raw/_job_results.json

      - name: Checkout policy repo (handoff script)
        uses: actions/checkout@v4
        with:
          repository: antiphoria/.github
          ref: ${{ inputs.policy-ref }}
          path: .org-handoff

      - name: Build Cursor handoff bundle
        shell: bash
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          bash .org-handoff/scripts/ci-handoff-report.sh handoff-raw handoff-bundle

      - name: Zip handoff bundle
        shell: bash
        run: zip -r ci-handoff.zip handoff-bundle

      - name: Upload Cursor CI handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-handoff-${{ github.run_id }}
          path: ci-handoff.zip
          if-no-files-found: warn
          retention-days: 30
