# Caller workflow for member repos. For Trivy SARIF + code scanning, set upload-trivy-sarif: true
# and add permissions.security-events: write (see QUALITY_POLICY.md).
name: Org Quality

on:
  pull_request:
  push:
    branches:
      - $default-branch
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    uses: antiphoria/.github/.github/workflows/quality-gate.yml@main
    with:
      policy-ref: main
      upload-trivy-sarif: false
